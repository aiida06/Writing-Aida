<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafts I Never Sent — Aida</title>
    <style>
        /* --- SEMUA WARNA BIRU GELAP ASLI KAMU --- */
        body {
            background-color: #1F2A44; /* Warna Biru Gelap CodePen */
            color: #F5F1ED;
            font-family: 'Georgia', serif;
            padding: 40px;
            text-align: center;
            margin: 0;
        }

        h1 { color: #C75C5C; margin-top: 20px; }
        
        .subtitle { margin-bottom: 40px; font-style: italic; opacity: 0.8; }

        .folders {
            display: flex; justify-content: center; gap: 20px;
            margin-bottom: 40px; flex-wrap: wrap;
        }

        .folder {
            background-color: #2E3A59;
            color: #F5F1ED;
            padding: 15px 25px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            border: none;
            /* Shadow tegas sesuai gaya kamu */
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }

        .folder:hover {
            background-color: #C75C5C;
            transform: scale(1.05);
        }

        .content {
            max-width: 700px; margin: auto;
            background-color: #2E3A59;
            padding: 30px; border-radius: 12px;
            text-align: left; line-height: 1.8;
            display: none; /* Sembunyi dulu */
            border: 1px solid rgba(255,255,255,0.1);
        }

        .show { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #disqus_thread { margin-top: 30px; }
    </style>
</head>
<body>

    <h1>Drafts I Never Sent — Aida:3</h1>
    <p class="subtitle">"Selamat datang di pikiranku^∆^.. agak berantakan, tapi mungkin kamu akan suka."</p>

    <div class="folders">
        <div class="folder" onclick="buka('cerita')">📁 Cerita Pendek</div>
        <div class="folder" onclick="buka('random')">📁 Random</div>
    </div>

    <div id="boxKonten" class="content">
        <div id="isiTeks"></div>
        <div id="disqus_thread"></div>
    </div>

    <script>
        /* --- JAVASCRIPT BIAR TOMBOL BISA DIKLIK --- */
        function buka(tipe) {
            var box = document.getElementById('boxKonten');
            var teks = document.getElementById('isiTeks');
            
            if (tipe === 'cerita') {
                teks.innerHTML = "<h3>Judul Cerita Kamu</h3><p>Tulis draf cerita kamu di sini ya...</p>";
            } else {
                teks.innerHTML = "<h3>Random Thoughts</h3><p>Tulis pikiran random kamu di sini...</p>";
            }
            
            box.classList.add('show');
        }
    </script>

</body>
</html>
