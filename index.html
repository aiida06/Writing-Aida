<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drafts I Never Sent — Aida:3</title>

<!-- Font Comic Neue untuk folder -->
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  background-color: #1F2A44;
  color: #F5F1ED;
  font-family: 'Georgia', serif;
  padding: 40px;
  text-align: center;
}

h1 {
  color: #E8D1A7;
  text-shadow: 
    1px 1px 0 #A8324A,
    2px 2px 0 #743014;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

.subtitle {
  margin-bottom: 40px;
  font-style: italic;
  opacity: 0.9;
  font-size: 12px;
}

h2 {
  font-size: 26px;
  font-family: 'Playfair Display', serif;
  color: #F2F2F2;
  text-shadow: 2px 2px 0 #727355;
  letter-spacing: 2px;
  margin-bottom: 22px;
}

/* ANIMASI MASUK */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1s ease forwards;
}
.fade-in:nth-child(1) { animation-delay: 0.2s; }
.fade-in:nth-child(2) { animation-delay: 0.4s; }
.fade-in:nth-child(3) { animation-delay: 0.6s; }

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Folder */
.folders {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
}

.folder {
  background-color: #2E3A59;
  padding: 15px 25px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
}

.folder:hover {
  background-color: #C75C5C;
  transform: scale(1.05);
}

.content {
  max-width: 700px;
  margin: auto;
  background-color: #2E3A59;
  padding: 30px;
  border-radius: 12px;
  text-align: left;
  line-height: 1.8;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
}

.content.show {
  opacity: 1;
  transform: translateY(0);
}

#disqus_thread {
  margin-top: 50px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

/* ========================= */
/* ✨ TAMBAHAN KHUSUS ✨ */
/* font lucu hanya folder & sub-folder */
.folder,
.sub-folder {
  font-family:"Comic Neue", cursive;
  letter-spacing: 1px;
}

/* tombol navigasi */
.nav-buttons {
  margin-top: 40px;
  margin-bottom: 30px;
  display: flex;
  justify-content: center;
  gap: 20px;
}
.nav-buttons button {
  padding: 8px 16px;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
  border: none;
  background-color: #C75C5C;
  color: #F5F1ED;
  transition: 0.3s;
}
.nav-buttons button:hover {
  background-color: #E89393;
}
</style>
</head>

<body>

<h1 class="fade-in">Drafts I Never Sent —Aida:3</h1>

<p class="subtitle fade-in">
  <span id="typing"></span>
  <span id="text-asli" style="display:none;">
Selamat datang di pikiranku^∆^.. agak berantakan, tapi mungkin kamu akan suka.
  </span>
</p>

<div class="folders fade-in">
  <div class="folder" onclick="bukaFolder('cerpen')">📁 Cerita Pendek</div>
  <div class="folder" onclick="bukaFolder('random')">📁 Random</div>
</div>

<div id="content" class="content"></div>

<!-- tombol navigasi -->
<div class="nav-buttons">
  <button onclick="goBack()">← Back</button>
  <button onclick="goNext()">Next →</button>
</div>

<!-- audio (hidden) -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_946e0c4c7b.mp3" type="audio/mpeg">
</audio>

<div id="disqus_thread"></div>

<script>
// ====== Subtitle Typing ======
function typeSubtitle() {
  const fullText = document.getElementById("text-asli").textContent;
  const typingEl = document.getElementById("typing");
  const textAsliEl = document.getElementById("text-asli");

  let i = 0;
  typingEl.textContent = "";

  const typingSpeed = 105;

  const interval = setInterval(() => {
    typingEl.textContent += fullText[i];
    i++;
    if (i >= fullText.length) {
      clearInterval(interval);
      textAsliEl.style.display = "inline";
      typingEl.style.display = "none";
    }
  }, typingSpeed);
}
window.addEventListener("load", () => { typeSubtitle(); });

// ====== Folder & Content ======
let currentPage = "";

function bukaFolder(nama) {
  currentPage = nama;
  const content = document.getElementById("content");
  const music = document.getElementById("bgMusic");

  music.pause();
  music.currentTime = 0;

  content.classList.remove("show");

  setTimeout(() => {
    if (nama === "random") {
      content.innerHTML = `
        <div class="sub-folder" onclick="bukaIsi('cinta')">
          📄 Tentang Rasa yang Tak Pernah Sederhana
        </div>
      `;
    }

    if (nama === "cerpen") {
      content.innerHTML = `
        <h2>~Coming Soon~</h2>
        <div class="sub-folder">
          📄 
        </div>
      `;
    }

    content.classList.add("show");
  }, 200);
}

function bukaIsi(nama) {
  const content = document.getElementById("content");
  const music = document.getElementById("bgMusic");

  content.classList.remove("show");

  setTimeout(() => {
    if (nama === "cinta") {
      music.volume = 0.4;
      music.play();

      content.innerHTML = `
        <h2>Tentang Rasa yang Tak Pernah Sederhana</h2>

        <p>Kenapa cinta bisa menjadi sebuah perasaan yang punya kekuatan begitu besar?</p>

        <p>Bahkan tulisan ini dimulai dari rasa tersebut. Tulisan yang entah akan jadi apa, entah akan seberapa panjang. Tulisan ini hanya tau kalau ia dimulai dari cinta.</p>

        <p>Sering kali manusia menginginkan cinta, saat sedang sedih, saat sedang bahagia, di kondisi-kondisi yang cenderung besar bagi seseorang, mereka akan mendambakan adanya cinta di antara hal-hal lainnya. Dari sekian banyak hal yang bisa diminta, manusia akan meminta cinta. Setidaknya bagi mereka yang sudah pernah mengenalnya.</p>

        <p>Namun, bukankah dunia memang dipenuhi dengan cinta? Tuhan memberikan cinta-Nya kepada manusia dalam segala rupa, di segala waktu. Cahaya matahari pagi, hujan di sore hari, desir ombak, angin lembut di malam hari, seandainya bersikeras untuk lebih merasakan hal-hal di sekitar, manusia akan menemukan cinta dalam segalanya.</p>

        <p>Cinta dari manusia lain lah yang sering diidamkan. Seseorang untuk berbagi perasaan. Ketika sebuah mulut berbicara kemudian kata-kata yang keluar dapat tersampaikan ke hati yang lain. Berbicara sembari dimengerti jiwanya, bercerita seolah mereka sejiwa. Ketika keberadaan satu sama lain bukan lagi sesuatu yang perlu diminta, seolah terhubung, seolah menjadi satu.</p>

        <p>Waktu akan berlalu, tapi cinta akan terus tertinggal. Sekecil apa pun itu, dalam berbagai rupa, di berbagai tempat, dan di segala waktu. Saat cinta yang ditemui adalah cinta yang sesungguhnya. Cinta yang bisa memberikan rasa aman, rasa nyaman, bahkan humor di tengah lara. Tak banyak cinta seperti itu. Sungguh.</p>
      `;
    }

    content.classList.add("show");
  }, 200);
}

// ====== Navigasi ======
function goBack() { bukaFolder(currentPage); }
function goNext() { bukaIsi("cinta"); }

// ====== Disqus Embed ======
(function() {
var d = document, s = d.createElement('script');
s.src = 'https://writing-aida.disqus.com/embed.js';
s.setAttribute('data-timestamp', +new Date());
(d.head || d.body).appendChild(s);
})();
</script>

</body>
</html>
